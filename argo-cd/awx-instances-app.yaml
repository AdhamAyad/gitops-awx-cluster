apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: awx-instances
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/AdhamAyad/gitops-awx-cluster.git
    targetRevision: main
    path: k8s/awx-instances
  destination:
    server: https://kubernetes.default.svc
    namespace: awx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
