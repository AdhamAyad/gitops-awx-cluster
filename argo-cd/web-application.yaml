apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: web-server
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/AdhamAyad/gitops-alert-operator.git
    targetRevision: main
    path: webserver
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m