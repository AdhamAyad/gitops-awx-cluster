apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: awx-operator
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ansible/awx-operator.git
    targetRevision: 2.19.1
    path: config/default
    kustomize:
      images:
        - name: gcr.io/kubebuilder/kube-rbac-proxy
          newName: quay.io/brancz/kube-rbac-proxy
          newTag: v0.15.0
  destination:
    server: https://kubernetes.default.svc
    namespace: awx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
