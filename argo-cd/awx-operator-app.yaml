apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: awx-operator
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://ansible-community.github.io/awx-operator-helm/
    targetRevision: 2.19.1
    chart: awx-operator
    helm:
      values: |
        kubeRbacProxy:
          image:
            repository: quay.io/brancz/kube-rbac-proxy
            tag: v0.15.0
  destination:
    server: https://kubernetes.default.svc
    namespace: awx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
